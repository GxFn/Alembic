# Alembic 发布：推送 v* tag 后，由 GitHub Actions 构建、测试并发布到 npm
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: Alembic

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # npm provenance / trusted publishing
      contents: read
    steps:
      - name: Checkout Alembic
        uses: actions/checkout@v5
        with:
          path: Alembic

      - name: Checkout progressive-chain-validation skill
        uses: actions/checkout@v5
        with:
          repository: GxFn/progressive-chain-validation
          path: Alembic/skills/progressive-chain-validation

      - name: Checkout AlembicCore
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Checkout AlembicAgent
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicAgent
          path: AlembicAgent

      - name: Checkout AlembicDashboard
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicDashboard
          path: AlembicDashboard

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          cache-dependency-path: |
            Alembic/package-lock.json
            AlembicCore/package-lock.json
            AlembicAgent/package-lock.json
            AlembicDashboard/package-lock.json

      - name: Upgrade npm for trusted publishing
        run: |
          set -euo pipefail
          current_npm="$(npm --version)"
          echo "Bundled npm: ${current_npm}"
          if npm install -g npm@^11.5.1; then
            echo "Release npm: $(npm --version)"
          else
            echo "::warning::Unable to upgrade npm; continuing with bundled npm ${current_npm} so the release can reach the publish boundary."
          fi

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Record sibling source commits
        run: |
          echo "AlembicCore=$(git -C ../AlembicCore rev-parse HEAD)"
          echo "AlembicAgent=$(git -C ../AlembicAgent rev-parse HEAD)"
          echo "AlembicDashboard=$(git -C ../AlembicDashboard rev-parse HEAD)"

      - name: Install workspace dependencies
        run: |
          npm ci --prefix ../AlembicCore
          npm ci --prefix ../AlembicAgent
          npm ci --prefix ../AlembicDashboard
          npm ci

      - name: Build sibling packages
        run: |
          npm run build --prefix ../AlembicCore
          npm run build --prefix ../AlembicAgent

      - name: Build TypeScript
        run: npm run build

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Lint
        run: npm run lint -- --diagnostic-level=error

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Verify dev root package remains blocked
        run: |
          if npm run release:package-guard; then
            echo "::error::Dev root package unexpectedly passed publish boundary checks"
            exit 1
          fi
          echo "Dev root package remains blocked from direct npm publish as expected."

      - name: Prepare npm publish staging package
        run: npm run release:staging:prepare

      - name: Preview npm publish staging package
        run: npm run release:staging:pack

      - name: Publish to npm
        # Publish the staging package only. The repository root package.json keeps local
        # source file dependencies for development and is intentionally blocked above.
        run: |
          set -euo pipefail

          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Publishing with configured NPM_TOKEN and provenance."
            set +e
            npm publish .release/alembic-ai --provenance --access public --ignore-scripts
            status=$?
            set -e
            if [ "${status}" -eq 0 ]; then
              exit 0
            fi

            echo "::warning::NPM_TOKEN publish failed; retrying with npm trusted publishing through GitHub OIDC."
            unset NODE_AUTH_TOKEN
          else
            echo "NPM_TOKEN is not configured; publishing with npm trusted publishing through GitHub OIDC."
          fi

          npm publish .release/alembic-ai --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
