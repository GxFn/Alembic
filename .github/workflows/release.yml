# Alembic 发布：推送 v* tag 后，由 GitHub Actions 构建、测试并发布到 npm
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: Alembic

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance / trusted publishing
      contents: read
    steps:
      - name: Checkout Alembic
        uses: actions/checkout@v5
        with:
          path: Alembic

      - name: Checkout AlembicCore
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Checkout AlembicAgent
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicAgent
          path: AlembicAgent

      - name: Checkout AlembicDashboard
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicDashboard
          path: AlembicDashboard

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          cache-dependency-path: |
            Alembic/package-lock.json
            AlembicCore/package-lock.json
            AlembicAgent/package-lock.json
            AlembicDashboard/package-lock.json

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Record sibling source commits
        run: |
          echo "AlembicCore=$(git -C ../AlembicCore rev-parse HEAD)"
          echo "AlembicAgent=$(git -C ../AlembicAgent rev-parse HEAD)"
          echo "AlembicDashboard=$(git -C ../AlembicDashboard rev-parse HEAD)"

      - name: Install workspace dependencies
        run: |
          npm ci --prefix ../AlembicCore
          npm ci --prefix ../AlembicAgent
          npm ci --prefix ../AlembicDashboard
          npm ci

      - name: Build sibling packages
        run: |
          npm run build --prefix ../AlembicCore
          npm run build --prefix ../AlembicAgent

      - name: Install VS Code extension dependencies
        run: npm run install:vscode-ext

      - name: Build TypeScript
        run: npm run build

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Build VS Code extension
        run: npm run build:vscode-ext

      - name: Lint
        run: npm run lint -- --diagnostic-level=error

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Verify root npm package boundary
        run: npm run release:package-guard

      - name: Preview npm package
        run: npm pack --dry-run

      - name: Preview VS Code extension package
        run: npm run package:vscode-ext -- --out /tmp/alembic-vscode.vsix

      - name: Upload VS Code extension package
        uses: actions/upload-artifact@v5
        with:
          name: alembic-vscode-extension
          path: /tmp/alembic-vscode.vsix

      - name: Publish to npm
        # Build artifacts are produced above; skip prepublishOnly to avoid duplicate builds.
        # This step remains unreachable until release:package-guard passes after package ownership
        # and registry dependency staging are explicitly resolved.
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
