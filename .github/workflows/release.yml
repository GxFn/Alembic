# Alembic 发布：打 tag v* 时构建、测试并发布到 npm
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # 供 npm publish --provenance 生成来源证明
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Set version from tag
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          npm version "$VER" --no-git-tag-version --allow-same-version
          echo "Publishing version: $VER"
          grep '"version"' package.json

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
